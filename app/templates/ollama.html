{% extends "base.html" %}
{% block title %}Argo · Ollama{% endblock %}
{% block screen_title %}Ollama{% endblock %}

{% block content %}
<h3>Modelli caricati</h3>
<div id="ps" class="models muted" aria-live="polite">carico…</div>

<h3>Log del server (live)</h3>
<div id="ollog" class="server-log" aria-live="polite"></div>
{% endblock %}

{% block footer %}
<div class="footer">
  <a class="btn ghost" href="/">Home</a>
  <button class="btn ghost" id="clear">Pulisci log</button>
</div>
{% endblock %}

{% block scripts %}
<script>
  Argo.streamOllamaLogs();
  Argo.pollOllamaPs();
  document.getElementById('clear').onclick = () => {
    document.getElementById('ollog').innerHTML = '';
  };
</script>
{% endblock %}
